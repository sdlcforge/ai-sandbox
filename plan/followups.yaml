version: 1
items:
    - title: Combine sequential docker inspect calls
      id: 4DzF
      date: "2026-07-06"
      tag: restore-fix
      text: 'running_config_matches() in src/utils.sh issues 9 sequential single-field `docker inspect -f ...` calls (one per label: image, profile-hash, mode, no-isolate-config, docker-proxy, clean-slate, marketplaces, plugins, enable-all-plugins) where a single multi-field format string would do, saving 8 subprocess spawns + Docker API round-trips per bare start/enter invocation. Purely a cold/warm-path nicety, not correctness-affecting. Note: restore_saved_config() in this same file no longer has this problem — it was incidentally consolidated to a single `docker inspect` call (reading only the `ai.sandbox.config` label) as a side effect of the full-config-restore plan''s label redesign, not a deliberate fix of this followup. Only running_config_matches() remains to be addressed.'
    - title: No size bound on config label decode
      id: qVbA
      date: "2026-07-06"
      tag: full-config-restore
      text: 'Phase-review (security lens, suggestion/low-confidence, non-blocking): restore_saved_config and status.sh''s config decode impose no size bound on the decoded ai.sandbox.config label before base64-decoding/jq-parsing it. Label is only writable at container-create time by the host process, so practical risk is low; optional defense-in-depth would bound the decoded payload size before piping into jq.'
    - title: 'Pre-existing, out-of-scope observation: RESER'
      id: HTL6
      date: "2026-07-06"
      tag: full-config-restore
      text: '[phase-01-full-config-restore/003-add-detail-alias-and-config-display.md] Pre-existing, out-of-scope observation: RESERVED_NAMES in src/options.sh is unreachable for any word also in PER_INSTANCE_COMMANDS (e.g. `ai-sandbox create detail` succeeds with SANDBOX_NAME=detail instead of being rejected — same pre-existing gap already affects `create status`). Not introduced by this task; fixing would touch the create-branch logic affecting multiple existing commands. Recommend a followup rather than expanding this task''s scope.'
