    - title: sandbox-volumes tests fail on ~/.config drift
      id: Jis0
      date: "2026-07-10"
      tag: fix-quiet-stdout-leak-and-status-failures
      text: 'Discovered while fixing followups Trit/zSwd, out of scope for those. test/integration/container_spec.sh''s "sandbox-volumes reports clean status on an untouched overlay" (line 51) and "sandbox-volumes shows a diff for the drifted path" (line 68) fail because they mount and diff the real host ~/.config (mirror mode) and assume it''s pristine on a fresh container boot. On the dev machine this ran on, ~/.config legitimately contains drift-triggering content unrelated to any test action (e.g. iterm2/sockets/secrets being a live socket, dangling node_modules symlinks) — confirmed by running `sandbox-volumes diff "$HOME/.config"` against a brand-new container immediately after boot, before any test executes user-exec. Fixing this requires a design decision: should sandbox-volumes ignore certain classes of pre-existing drift, should this test target an isolated scratch $XDG_CONFIG_HOME instead of the real one, or should CI run against a throwaway home directory? Needs manager/user input before implementation.'
    - title: Linux host/lan-access detection
      id: uL4v
      date: "2026-07-10"
      tag: lockdown-egress
      text: 'The lockdown-egress plan''s host-access and lan-access capabilities (plan/phase-02-network-capabilities/003-add-host-access-capability.md, 005-add-lan-access-capability.md) implement host-side detection (listening-port enumeration via lsof, LAN-CIDR detection via route get default/ipconfig) as macOS-only, consistent with the project''s macOS-first stance — this is a deliberate, flagged V1 scope limit, not an oversight. Follow-up: add Linux equivalents (ss/ip route or similar) for both detection steps so host-access/lan-access work when ai-sandbox runs on a Linux host. Also needs a cross-platform test structure before this can be validated: settle on an approach that is host-aware (run definitive tests against whatever host OS is actually running the suite) plus uses Docker to run the same suite against one or more Linux target images for verification from a macOS host (and vice versa in principle). Investigate existing frameworks/patterns for this kind of host-plus-containerized-target test matrix before hand-rolling one.'
    - title: Anthropic API host untested/coincidental
      id: 5bMD
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-review, phase-01-firewall-enforcement, correctness-001] docker/init-firewall.sh''s only working Anthropic-host ACCEPT rule is a bare `anthropic.com` hostname resolution; there''s no literal `api.anthropic.com` entry (the `.anthropic.com` leading-dot line is permanently non-resolving, tracked separately). Confirmed empirically that anthropic.com and api.anthropic.com currently share an IP, so the sandbox''s core "run Claude Code against the Anthropic API" use case works today only by DNS coincidence, untested. Add an explicit api.anthropic.com ACCEPT rule and a reachability assertion in test/integration/container_spec.sh''s Firewall rules block, alongside the existing github.com check.'
    - title: claude-install fallback broken under deny
      id: AK1Z
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-review, phase-01-firewall-enforcement, correctness-002] docker/rootfs/etc/cont-init.d/05-install-claude (pre-existing, unmodified) falls back to `bun install -g @anthropic-ai/claude-code` against registry.npmjs.org when the binary is missing at container start. registry.npmjs.org is not on the new default-deny allow-list, so this fallback now silently fails (caught, logged as warning, non-fatal) instead of always succeeding as before. Narrow real-world exposure since normal builds pre-install claude at Dockerfile build time, but a genuine undocumented behavior change. Decide: allow-list the npm/bun registry host, or explicitly document that this bootstrap path is now build-time-only.'
    - title: No breadth validation on network.allow
      id: RbKz
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-review, phase-01-firewall-enforcement, security-002] Neither bin/profile-installer.js''s network.allow schema check nor docker/init-firewall.sh''s marketplace/network.allow ACCEPT-rule loops validate CIDR breadth. A profile with network.allow: ["0.0.0.0/0"] silently and completely defeats the port-443 default-deny scoping. Defense-in-depth gap (profile author is same trust level as operator), not externally exploitable, but worth a lightweight sanity check/warning for overly-broad entries (e.g. reject or warn on prefix lengths shorter than /24).'
    - title: Non-atomic firewall flush window
      id: NlrG
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-review, phase-01-firewall-enforcement, security-004] docker/init-firewall.sh flushes the OUTPUT chain (iptables -F/-X) and only re-establishes the default-deny catch-all at the end via incremental `iptables -A` calls, leaving a brief unfiltered window between flush and final DROP rule. Narrow, early-boot-only exposure (suggestion/low confidence). If this matters for the threat model, replace incremental rule-building with a single atomic `iptables-restore` of the fully-assembled ruleset including the final DROP.'
    - title: network_allow missing from persist triad
      id: PmJ2
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-review, phase-01-firewall-enforcement, architecture-002] docs/architecture.md''s "Config persistence and restore" section documents a triad pattern (docker-compose environment: entry + ai.sandbox.<field> container label + running_config_matches() comparison dimension) for profile-derived env vars like AI_SANDBOX_MARKETPLACES. The new AI_SANDBOX_NETWORK_ALLOW (Task 003) matches the environment: half but has no ai.sandbox.network-allow label and isn''t compared in running_config_matches()/surfaced in `ai-sandbox detail`''s Configuration: output. Not currently exploitable (network.allow has no CLI-delta yet, fully covered by PROFILE_COMPOSITION_HASH), but plan/notes/investigation-findings.md commits Phase 3 (--allow-egress) to the same triad shape end-to-end, so this should be closed then (or explicitly documented as deferred) rather than left silently incomplete.'
    - title: Full integration suite not run live
      id: nJNu
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-01-firewall-enforcement, task 004] container_spec.sh (Firewall block), network_allow_spec.sh, and docker_proxy_spec.sh could not be run via their normal `make test.integration` path during this plan''s execution: `status --test-check` refuses while a host claude session is live (this orchestrating session itself), and starting the real container concurrently would risk the exact claude-mem corruption the project''s concurrency invariant forbids. Task 004''s sidecar mechanism was instead validated empirically by running the real scripts directly in a safe harness (verified capability absence, un-flushable firewall, correct allow/deny egress, both restart lifecycles). Before this plan is considered fully done, re-run the full `make test.integration` suite (container_spec.sh, network_allow_spec.sh, docker_proxy_spec.sh) on the built image in an environment with no live host claude session, to catch anything the harness-style validation couldn''t (e.g. real s6-overlay boot-order interactions).'
    - title: Dead sudoers entry for init-firewall.sh
      id: O49Y
      date: "2026-07-10"
      tag: firewall-enforcement
      text: '[phase-01-firewall-enforcement, task 004] docker/Dockerfile.base''s `node ALL=(root) NOPASSWD: /usr/local/bin/init-firewall.sh` sudoers entry is now inert since Task 004 moved firewall application to the firewall-init sidecar — the ai-sandbox container no longer has NET_ADMIN, so that script can no longer succeed there. Left untouched by Task 004 per its own scope (no sudoers surgery). Cleanup candidate: remove the dead entry.'
