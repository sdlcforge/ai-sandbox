      text: '[phase-02-profiles-resource/002-complete-name-resolution-and-verb-gating.md] Pre-existing latent bug, not touched (out of scope, unrelated to this task''s Requirements): src/profiles.sh''s profiles_create() -> _cp_entries_to_json() uses `local -n` (bash 4.3+ nameref syntax), which throws under macOS system bash 3.2 (bin/ai-sandbox.sh''s shebang target) — harmlessly swallowed in the smoke-tested empty-array case, but would silently produce empty skills/hooks/agents JSON for a profile that has real discoverable entries. Introduced in phase-02 task 001, which fixed two other bash-3.2 portability issues in this same file but missed this one.'
