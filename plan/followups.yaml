version: 1
items:
    - title: Flags-before-command-word mis-parse
      id: sSU2
      date: "2026-07-06"
      tag: fix-name-flags-parsing
      text: 'parse_options() mis-routes when a config flag precedes the per-instance command word, e.g. `ai-sandbox myname --profile x start`. Reproduced via scratch probe: result is SANDBOX_NAME=myname, CMD=enter (not start), PROFILES=(x), ARGS=(start) — "start" is silently absorbed into the passthrough ARGS array instead of being recognized as the per-instance command. Structurally similar to the just-fixed bug (name-followed-directly-by-flags defaulting CMD to enter), but here Phase 3''s flag parser has no mechanism to promote a later bare word back into CMD. Needs its own scoped fix.'
    - title: Marketplace/plugin config not persisted
      id: AL7i
      date: "2026-07-06"
      tag: config-restore
      text: --add-marketplace, --enable-plugin, and --enable-all are not recorded as docker labels at create time (only ai.sandbox.profiles is), so this config is silently dropped on a later bare `enter`/`start` invocation with no flags. Doesn't currently trigger the false-positive recreate prompt (running_config_matches doesn't check these fields), but the resulting container silently loses the requested marketplace/plugin setup. Discovered while diagnosing the mode/clean-slate restore bug (see plan for that fix) — src/index.sh:73-87 restore block and docker-compose.yaml labels would need extending to cover these fields too.
    - title: 'Task agent hit a mid-response API disconnect '
      id: S6Up
      date: "2026-07-06"
      tag: restore-fix
      text: '[phase-01-restore-fix/001-restore-mode-and-clean-slate-on-bare-enter.md] Task agent hit a mid-response API disconnect (Connection closed mid-response) after committing its work but before returning its structured report. The manager verified the commit directly (git show, make lint, make test.unit) and confirms it fully satisfies the task doc''s Requirements and Validation sections. No re-dispatch was necessary.'
    - title: Combine sequential docker inspect calls
      id: 4DzF
      date: "2026-07-06"
      tag: restore-fix
      text: 'Phase-review (efficiency lens, non-blocking suggestion): restore_saved_config() in src/utils.sh issues three sequential `docker inspect -f ...` calls (one per label: profiles, mode, clean-slate) where a single multi-field format string would do, saving two subprocess spawns + Docker API round-trips per bare start/enter invocation. Noted as consistent with the existing convention in running_config_matches() (six sequential calls, unchanged), so this is a pre-existing pattern being extended, not a new regression — purely a cold/warm-path nicety, not correctness-affecting. If addressed, do both functions together in the same pass for consistency (expands scope beyond a single trivial edit, hence deferred rather than dispatched immediately).'
    - title: plan_register/deregister no-op vs .flow/
      id: HSjz
      date: "2026-07-06"
      tag: flow-tooling
      text: .flow/ is gitignored in this repo (see commit 55bc14b, "update to ignore 'worktrees' and '.flow' dirs"). mcp__flow-mcp__plan_register and plan_deregister both claim to commit .flow/plans/<slug>.json changes to the working branch via `git rm`/`git add`, but since the path is untracked+ignored, that step silently no-ops — plan_register never actually creates a git-tracked record, and plan_deregister returned a success record for `enter-mode-restore` without removing the file from disk (confirmed via direct `ls`/`test -f` after the call). Had to manually `rm .flow/plans/enter-mode-restore.json` during this session's plan finalization. This is a Flow-tooling gap, not specific to this bugfix plan — worth fixing in the flow-mcp server itself (e.g. detect the gitignored case and fall back to a plain filesystem write/delete) or reconsidering whether .flow/ should be gitignored at all, since other historical plans (clean-slate-mode, plugin-marketplace, multi-instance-sandbox) DO have committed open/close-plan-worktree commits from before the .flow/ gitignore rule was added.
    - title: plan_register doesn't scaffold TODO.yaml
      id: DGo0
      date: "2026-07-06"
      tag: flow-tooling
      text: 'During create-implementation-plan for plan/full-config-restore, plan/TODO.yaml did not exist in the freshly-provisioned plan worktree — mcp__flow-mcp__plan_register created .flow/plans/full-config-restore.json but no scaffold plan/TODO.yaml, so the dispatched analyze-change-request agent''s first mcp__flow-mcp__todo_add_phase call failed with plan-not-found. No MCP tool is exposed to a task agent for initializing this scaffold, so the agent hand-authored a minimal valid TODO.yaml (slug/version/title/empty phases) per the documented schema before retrying, after which all subsequent MCP mutations succeeded. Adjacent to but distinct from HSjz (plan_register/deregister no-op vs gitignored .flow/): this is about plan_register not also creating/committing an initial plan/TODO.yaml scaffold at plan-creation time. Worth fixing in flow-mcp (plan_register scaffolds TODO.yaml) or in create-implementation-plan''s Phase 0 (manager scaffolds it before dispatching analyze-change-request).'
