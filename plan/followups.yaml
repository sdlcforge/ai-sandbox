    - title: Dockerfile vs Dockerfile.base PATH drift
      id: J9mV
      date: "2026-07-10"
      tag: fix-enable-plugin-bug
      text: 'Discovered while adding test/integration/plugin_install_spec.sh: docker/Dockerfile (apparently unused for real builds) has an image-level `ENV PATH="${HOST_HOME}/.bun/bin:...:${PATH}"` line, but the actual Dockerfile used by builds — docker/Dockerfile.base, assembled via docker/scripts/assemble-dockerfile.sh — only appends those PATH entries to ~/.zshenv, not an image-level ENV. Consequence: `claude` (and other .bun/bin/.local/bin/go/bin tools) fail to resolve via a bare `sh -c`/argv `user-exec <cmd>` invocation inside the container; only `zsh -c` or an interactive/login shell (which sources ~/.zshenv) picks it up. This independently breaks the pre-existing test/integration/container_spec.sh:124 assertion ("Claude Code is installed and on PATH", via `user-exec claude --version` with no shell) — confirmed via direct testing, unrelated to any change in this task. Recommend either deleting the unused docker/Dockerfile or reconciling its PATH handling with Dockerfile.base, and fixing the container_spec.sh assertion to match actual container PATH behavior (or switching it to a login/zsh invocation).'
    - title: --quiet leaks docker-check output to stdout
      id: Trit
      date: "2026-07-10"
      tag: fix-dockerfile-path-drift
      text: Discovered while fixing followup J9mV (Dockerfile PATH drift), confirmed pre-existing on baseline via git stash A/B test — unrelated to that fix, out of scope for it. Under --quiet, several user-exec/root-exec invocations still print "Checking docker is running... confirmed." to stdout (src/utils.sh:42 area — qecho -n "Checking docker is running... " followed by an apparently un-guarded echo/print of "confirmed."). This pollutes stdout for tests using exact-match assertions (`The output should eq ...`), causing 10 failures in test/integration/container_spec.sh (sandbox-volumes status, Bun, User UID, Firewall rules, SSH agent forwarding, DEVCONTAINER env, Config isolation) plus similar failures observed in lifecycle_spec.sh, clean_container_spec.sh, and docker_proxy_spec.sh during a full `make test.integration` run. Needs investigation of the docker-running check path to properly gate the "confirmed." output behind QUIET.
