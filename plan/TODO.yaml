purpose_and_scope: |
  Add marketplace and plugin configuration support to ai-sandbox: three new CLI flags
  (--add-marketplace, --enable-plugin, --enable-all) and corresponding profile YAML fields
  (marketplaces, enable_all_plugins) that configure Claude Code plugins at container init time,
  including local/private plugins via file:// URIs.

