    - number: 1
      slug: fix-orphaned-sidecar-teardown
      title: Fix Orphaned Sidecar Teardown
      diff_base: 7c02e87dde4cc074d3889a3488f6d741e982bc0e
      tasks:
        - number: 1
          slug: restore-config-for-teardown-commands
          title: Restore Config For Teardown Commands
          path: phase-01-fix-orphaned-sidecar-teardown/001-restore-config-for-teardown-commands.md
          done: true
          tier: sonnet-high
          digest: 'Root cause: src/index.sh only called restore_saved_config() for CMD == start|enter, so every other per-instance command (delete, clean, stop, fix-ssh, etc.) ran with whatever --profile flags (usually none) the invocation passed, silently dropping the persisted docker capability and its proxy sidecar/network from that invocation''s compose-file assembly. Fixed by extracting a should_restore_config() predicate (true for every reachable CMD except create) and broadening the call site to use it. Also fixed a related missing -p "${COMPOSE_PROJECT}" flag on do_build() and fix_ssh()''s compose invocations. Verified via from-scratch reproduction against the pre-fix commit that the new integration tests actually fail without the fix and pass with it.'
          git:
            branch: phase-01-task-01-restore-config-teardown-comman
            commit:
                - c96efe2
            merge: 55e5469c24b1caa172538b150fdf9bd08d2b0bdc
        - number: 2
          slug: fix-review-regressions
          title: Fix Robustness Regressions From Restore Broadening
          path: phase-01-fix-orphaned-sidecar-teardown/002-fix-review-regressions.md
          done: true
          tier: sonnet-high
          digest: 'Fixed both review-flagged regressions from task 001''s restore-broadening. Requirement 1: restore_saved_config() now re-validates each restored profile name against profile_exists() before trusting it, dropping unresolvable names with a warning instead of letting bin/profile-installer.js hard-die() and abort delete/stop/clean/etc. before dispatch. Requirement 2: added fix-ssh to src/index.sh''s credential-snapshot CMD guard so a restored CLEAN_SLATE=true correctly triggers credential capture before COMPOSE_FILES assembly picks the claude-auth overlay, preventing --force-recreate from destroying credentials with nothing to replace them. Both fixes are minimal, mirror existing codebase patterns, and are backed by 6 new regression tests A/B-verified against task 001''s merge commit. Full unit suite (222 examples) and the orphaned-sidecar integration suite (10 examples) are green; unrelated pre-existing integration failures confirmed identical before and after this diff.'
          git:
            branch: phase-01-task-02-fix-review-regressions
            commit:
                - 55b05fe
            merge: 4f9708dfa7e7441f4dd3ab2ef6a26f954a5ae5ed
        - number: 3
          slug: fix-capability-loss-on-profile-drop
          title: Fix Capability Loss When Restore Drops An Unresolvable Profile
          path: phase-01-fix-orphaned-sidecar-teardown/003-fix-capability-loss-on-profile-drop.md
          done: true
          tier: sonnet-high
          digest: 'Closed the capability-loss-on-profile-drop gap left by task 002: EFFECTIVE_PROXY now falls back to the container''s persisted ai.sandbox.docker-proxy label whenever this invocation''s profile resolution would otherwise say the docker capability is absent but a container already exists — covering both restore_saved_config()''s profile-drop path and a directly-provided --profile flag naming a since-drifted profile. Added a live-Docker integration test using a throwaway custom profile deleted mid-flight, A/B-verified against task 002''s merge commit (fails pre-fix, passes post-fix). Re-ran task 001''s integration suite alongside the new file — all 13 examples across both files pass, no sidecar container/network left behind.'
          git:
            branch: phase-01-task-03-fix-capability-loss-on-profile
            commit:
                - cc12d8d
            merge: 4fa1bc2912d87b242f5524579cb3e3e1eb8b92a9
        - number: 4
          slug: scope-proxy-label-fallback
          title: Scope Proxy-Label Fallback To Teardown Commands Only
          path: phase-01-fix-orphaned-sidecar-teardown/004-scope-proxy-label-fallback.md
          done: true
          tier: sonnet-high
          digest: Task 003's EFFECTIVE_PROXY label fallback fired unconditionally on every per-instance command, including start/enter, silently re-granting the docker capability (and network access to the docker-socket-proxy sidecar, a documented escape vector) even when a user explicitly asked to remove it via --profile. Added should_force_proxy_label_fallback() (src/utils.sh), scoped to {stop, delete, clean, fix-ssh} — the only commands where the original orphaned-sidecar bug manifests — and guarded the fallback in src/index.sh with it, plus a one-line stderr warning whenever the fallback actually overrides EFFECTIVE_PROXY. Added unit coverage for the predicate and a new live-Docker integration test proving "start --profile <non-docker>" now actually drops the capability; A/B-verified against task 003's merge commit via a disposable detached worktree (fails pre-fix, passes post-fix). Confirmed tasks 001 and 003's own integration suites still pass unmodified. Requirement 4 (amending the phase-2 doc-update task) was explicitly left untouched per the task doc's own instruction.
          git:
            branch: phase-01-task-04-scope-proxy-label-fallback
            commit:
                - 716d157
            merge: a16c5c1ad79efb4f93f79e82a54c6b42f0ac8a70
        - number: 5
          slug: gate-label-fallback-on-explicit-invocation
          title: Gate The Proxy-Label Fallback On Explicit-Invocation, Not CMD Alone
          path: phase-01-fix-orphaned-sidecar-teardown/005-gate-label-fallback-on-explicit-invocation.md
          done: true
          tier: sonnet-high
          digest: 'Refined task 004''s CMD-only gating of the EFFECTIVE_PROXY label fallback into a CMD × CONFIG_FLAGS_PROVIDED gate: stop/delete/clean still force the fallback unconditionally, but fix-ssh/start/enter/up now only do so when CONFIG_FLAGS_PROVIDED != "true". This closes two round-4 gaps: bare start/enter against a drifted docker-granting profile no longer silently loses the capability, and an explicit fix-ssh --profile <non-docker> can now actually drop the capability instead of being silently overridden. Both fixes were proven with new live-Docker integration tests, each A/B-verified against task 004''s merge commit a16c5c1 (fails pre-fix, passes post-fix). All previously-passing suites (tasks 001/003/004) remain green. Per Requirement 6, arch-review-003 and efficiency-001/002/003 were intentionally left untouched — confirmed already tracked in plan/followups.yaml.'
          git:
            branch: phase-01-task-05-gate-label-fallback-on-explici
            commit:
                - b580a52
            merge: 1e7e820e0323c7fc6bfb17fc2998d9b59895c99f
