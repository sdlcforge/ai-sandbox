# docker-compose.chromium.yaml
# Overlay applied when the `chromium` capability is active. Chromium and its
# X11 dependencies are installed by the chromium Dockerfile fragment; this
# overlay only supplies the runtime config Chromium needs in Docker:
# - DISPLAY pointing at the host X server (XQuartz on macOS)
# - 2GB shared memory required for Chromium in Docker
services:
  ai-sandbox:
    environment:
      - DISPLAY=host.docker.internal:0
    shm_size: '2gb'
