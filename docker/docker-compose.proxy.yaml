# docker-compose.proxy.yaml
# Overlay that gives the sandbox container gated access to the host Docker daemon
# via tecnativa/docker-socket-proxy. Enabled with `ai-sandbox --docker`.
#
# Security note: this is a mitigation, not a boundary. With CONTAINERS=1 + POST=1
# a hostile agent can still escape (e.g. `docker run -v /:/host`). Enable only
# when you actually need Docker access and trust the workload.
services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ai-sandbox-docker-proxy
    restart: unless-stopped
    environment:
      # Read endpoints
      INFO: 1
      PING: 1
      VERSION: 1
      # Images: list, inspect, pull, search (GET /images/search)
      IMAGES: 1
      # Containers: list, inspect, create, start, stop, remove
      CONTAINERS: 1
      # Builds (needs NETWORKS for BuildKit)
      BUILD: 1
      NETWORKS: 1
      # Volumes referenced by `run -v`
      VOLUMES: 1
      # Exec into running containers
      EXEC: 1
      # Required for create/start/build/exec (write endpoints)
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy
  ai-sandbox:
    environment:
      # Docker CLI auto-reads DOCKER_HOST; no other config needed.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    networks:
      - default
      - docker-proxy
    depends_on:
      - docker-socket-proxy
networks:
  docker-proxy:
    driver: bridge
    internal: true
